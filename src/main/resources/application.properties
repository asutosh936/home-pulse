# Server port
server.port=8080
server.servlet.context-path=/home-pulse

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:hmadb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in log
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring AI Anthropic properties
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
